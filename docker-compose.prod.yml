version: '3.9'

# ParikshaSuraksha — Single VM Production Deployment
# All services on one machine with nginx reverse proxy
# For MVP: <100 users, full system demo

services:
  # ─────────────────────────────────────────────
  # REVERSE PROXY
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - admin-dashboard
      - candidate-portal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # DATA LAYER
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass pariksha-mvp-2026
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "pariksha-mvp-2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8080
      --project=pariksha-mvp
    ports:
      - "8080:8080"
    restart: unless-stopped

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=pariksha-mvp
    ports:
      - "8085:8085"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # BACKEND SERVICES
  # ─────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: api-gateway
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=pariksha-mvp-jwt-secret-2026-change-in-real-prod
      - JWT_PRIVATE_KEY=pariksha-mvp-jwt-secret-2026-change-in-real-prod
      - JWT_PUBLIC_KEY=pariksha-mvp-jwt-secret-2026-change-in-real-prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=pariksha-mvp-2026
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GCP_PROJECT_ID=pariksha-mvp
      - QUESTION_SERVICE_URL=question-service:5001
      - PAPER_GENERATOR_URL=paper-generator:5002
      - CRYPTO_LIFECYCLE_URL=crypto-lifecycle:5003
      - EXAM_SESSION_URL=exam-session-service:5004
      - COLLUSION_ENGINE_URL=collusion-engine:5005
      - BLOCKCHAIN_SERVICE_URL=blockchain-service:5006
    depends_on:
      redis:
        condition: service_healthy
      firestore-emulator:
        condition: service_started
    restart: unless-stopped

  question-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: question-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GRPC_PORT=5001
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GCP_PROJECT_ID=pariksha-mvp
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - firestore-emulator
    restart: unless-stopped

  paper-generator:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: paper-generator
    environment:
      - NODE_ENV=production
      - PORT=3002
      - GRPC_PORT=5002
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=pariksha-mvp-2026
      - REDIS_USERNAME=default
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=pariksha-mvp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  crypto-lifecycle:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: crypto-lifecycle
    environment:
      - NODE_ENV=production
      - PORT=3003
      - GRPC_PORT=5003
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=pariksha-mvp-2026
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GCP_PROJECT_ID=pariksha-mvp
      - KMS_EMULATED=true
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  exam-session-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: exam-session-service
    environment:
      - NODE_ENV=production
      - PORT=3004
      - GRPC_PORT=5004
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=pariksha-mvp-2026
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=pariksha-mvp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  collusion-engine:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: collusion-engine
    environment:
      - NODE_ENV=production
      - PORT=3005
      - GRPC_PORT=5005
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GCP_PROJECT_ID=pariksha-mvp
    depends_on:
      - firestore-emulator
    restart: unless-stopped

  blockchain-service:
    build:
      context: .
      dockerfile: Dockerfile.nestjs
      args:
        SERVICE_NAME: blockchain-service
    environment:
      - NODE_ENV=production
      - PORT=3006
      - GRPC_PORT=5006
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=pariksha-mvp
      - FABRIC_ENABLED=false
    depends_on:
      - firestore-emulator
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # FRONTENDS
  # ─────────────────────────────────────────────
  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        SERVICE_NAME: admin-dashboard
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api-gateway:3000
      - NEXT_PUBLIC_WS_URL=ws://api-gateway:3000
    depends_on:
      - api-gateway
    restart: unless-stopped

  candidate-portal:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        SERVICE_NAME: candidate-portal
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api-gateway:3000
      - NEXT_PUBLIC_WS_URL=ws://api-gateway:3000
    depends_on:
      - api-gateway
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PYTHON WORKERS
  # ─────────────────────────────────────────────
  irt-calibrator:
    build:
      context: ./workers/irt-calibrator
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=pariksha-mvp
      - PUBSUB_SUBSCRIPTION=irt-calibration-trigger-sub
    depends_on:
      - pubsub-emulator
    restart: unless-stopped

  matrix-solver:
    build:
      context: ./workers/matrix-solver
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=pariksha-mvp
      - PUBSUB_SUBSCRIPTION=matrix-solver-trigger-sub
    depends_on:
      - pubsub-emulator
    restart: unless-stopped

  collusion-detector:
    build:
      context: ./workers/collusion-detector
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=pariksha-mvp
      - PUBSUB_SUBSCRIPTION=collusion-detection-trigger-sub
    depends_on:
      - pubsub-emulator
    restart: unless-stopped

  tlp-generator:
    build:
      context: ./workers/tlp-generator
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=pariksha-mvp
      - PUBSUB_SUBSCRIPTION=tlp-generation-trigger-sub
    depends_on:
      - pubsub-emulator
    restart: unless-stopped

  score-equator:
    build:
      context: ./workers/score-equator
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=pariksha-mvp
      - PUBSUB_SUBSCRIPTION=score-equation-trigger-sub
    depends_on:
      - pubsub-emulator
    restart: unless-stopped

volumes:
  redis-data:
