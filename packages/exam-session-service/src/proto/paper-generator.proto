syntax = "proto3";

package paper_generator;

service PaperGeneratorService {
  rpc GetPaper (GetPaperRequest) returns (GetPaperResponse);
  rpc GetAssignment (GetAssignmentRequest) returns (GetAssignmentResponse);
}

message GetPaperRequest {
  string exam_id = 1;
  string center_id = 2;
  int32 seat_num = 3;
}

message GetPaperResponse {
  string paper_json = 1;
  int64 question_count = 2;
}

message GetAssignmentRequest {
  string exam_id = 1;
  string center_id = 2;
  int32 seat_num = 3;
}

message GetAssignmentResponse {
  string assignment_json = 1;
}
