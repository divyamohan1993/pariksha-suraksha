global:
  image:
    registry: gcr.io/PROJECT_ID
    pullPolicy: IfNotPresent
  domain: pariksha.dmj.one
  environment: prod
  gcpProjectId: PROJECT_ID
  firestoreDatabase: "(default)"
  gcsBucketEncrypted: pariksha-encrypted-questions
  gcsBucketFieldTest: pariksha-field-test-data
  gcsBucketBackups: pariksha-backups
  gcsBucketReports: pariksha-reports

namespaces:
  api: pariksha-api
  web: pariksha-web
  workers: pariksha-workers
  fabric: pariksha-fabric
  data: pariksha-data

apiGateway:
  replicas: 2
  image: api-gateway
  port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
  serviceAccount:
    name: api-gateway-sa
    gcpServiceAccount: api-gateway@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

questionService:
  replicas: 2
  image: question-service
  port: 3001
  grpcPort: 5001
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
  serviceAccount:
    name: question-service-sa
    gcpServiceAccount: question-service@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

paperGenerator:
  replicas: 2
  image: paper-generator
  port: 3002
  grpcPort: 5002
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilization: 60
  serviceAccount:
    name: paper-generator-sa
    gcpServiceAccount: paper-generator@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

cryptoLifecycle:
  replicas: 2
  image: crypto-lifecycle
  port: 3003
  grpcPort: 5003
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  hpa:
    enabled: false
  serviceAccount:
    name: crypto-lifecycle-sa
    gcpServiceAccount: crypto-lifecycle@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

examSessionService:
  replicas: 2
  image: exam-session-service
  port: 3004
  grpcPort: 5004
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilization: 70
  serviceAccount:
    name: exam-session-service-sa
    gcpServiceAccount: exam-session-service@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

collusionEngine:
  replicas: 2
  image: collusion-engine
  port: 3005
  grpcPort: 5005
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  hpa:
    enabled: false
  serviceAccount:
    name: collusion-engine-sa
    gcpServiceAccount: collusion-engine@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

blockchainService:
  replicas: 2
  image: blockchain-service
  port: 3006
  grpcPort: 5006
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  hpa:
    enabled: false
  serviceAccount:
    name: blockchain-service-sa
    gcpServiceAccount: blockchain-service@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

adminDashboard:
  replicas: 2
  image: admin-dashboard
  port: 3010
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 80
  serviceAccount:
    name: admin-dashboard-sa
    gcpServiceAccount: admin-dashboard@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

candidatePortal:
  replicas: 2
  image: candidate-portal
  port: 3011
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 30
    targetCPUUtilization: 70
  serviceAccount:
    name: candidate-portal-sa
    gcpServiceAccount: candidate-portal@PROJECT_ID.iam.gserviceaccount.com
  nodeSelector:
    workload: general
  tolerations: []

workers:
  nodeSelector:
    workload: compute
  tolerations:
    - key: workload
      value: compute
      effect: NoSchedule
  irtCalibrator:
    replicas: 1
    image: irt-calibrator
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilization: 80
    pubsubSubscription: irt-calibrator-sub
    serviceAccount:
      name: irt-calibrator-sa
      gcpServiceAccount: irt-calibrator@PROJECT_ID.iam.gserviceaccount.com
  matrixSolver:
    replicas: 1
    image: matrix-solver
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilization: 80
    pubsubSubscription: matrix-solver-sub
    serviceAccount:
      name: matrix-solver-sa
      gcpServiceAccount: matrix-solver@PROJECT_ID.iam.gserviceaccount.com
  collusionDetector:
    replicas: 1
    image: collusion-detector
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilization: 80
    pubsubSubscription: collusion-detector-sub
    serviceAccount:
      name: collusion-detector-sa
      gcpServiceAccount: collusion-detector@PROJECT_ID.iam.gserviceaccount.com
  tlpGenerator:
    replicas: 1
    image: tlp-generator
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilization: 80
    pubsubSubscription: tlp-generator-sub
    serviceAccount:
      name: tlp-generator-sa
      gcpServiceAccount: tlp-generator@PROJECT_ID.iam.gserviceaccount.com
  scoreEquator:
    replicas: 1
    image: score-equator
    resources:
      requests:
        cpu: 2000m
        memory: 4Gi
      limits:
        cpu: 4000m
        memory: 8Gi
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilization: 80
    pubsubSubscription: score-equator-sub
    serviceAccount:
      name: score-equator-sa
      gcpServiceAccount: score-equator@PROJECT_ID.iam.gserviceaccount.com

redis:
  host: ""
  port: 6379

fabric:
  enabled: true
  peerImage: hyperledger/fabric-peer:2.5
  ordererImage: hyperledger/fabric-orderer:2.5
  caImage: hyperledger/fabric-ca:1.5
  couchdbImage: couchdb:3.3
  toolsImage: hyperledger/fabric-tools:2.5
  channelName: exam-lifecycle-channel
  chaincodeName: exam-audit
  chaincodeVersion: "1.0"
  orderer:
    batchTimeout: 2s
    maxMessageCount: 100
    absoluteMaxBytes: 10485760
    preferredMaxBytes: 2097152
  organizations:
    - name: ParikshaSurakshaOrg
      mspId: ParikshaSurakshaMSP
      peerCount: 2
      domain: pariksha.dmj.one
    - name: NTAOrg
      mspId: NTAMSP
      peerCount: 2
      domain: nta.pariksha.dmj.one
    - name: AuditorOrg
      mspId: AuditorMSP
      peerCount: 1
      domain: auditor.pariksha.dmj.one
  nodeSelector:
    workload: fabric
  tolerations:
    - key: workload
      value: fabric
      effect: NoSchedule
  persistence:
    enabled: true
    storageClass: standard
    peerSize: 20Gi
    ordererSize: 10Gi
    caSize: 5Gi
    couchdbSize: 20Gi

ingress:
  enabled: true
  className: gce
  tls:
    enabled: true
    secretName: pariksha-tls
  annotations:
    kubernetes.io/ingress.global-static-ip-name: pariksha-static-ip
    networking.gke.io/managed-certificates: pariksha-managed-cert
    kubernetes.io/ingress.class: gce

monitoring:
  enabled: true
  namespace: monitoring
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
  alerts:
    keyReleaseDeviationSeconds: 5
    paperGenLatencyMs: 100
    errorRateThreshold: 0.01
