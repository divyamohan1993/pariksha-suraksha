apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-api-gateway-config
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "api-gateway") | nindent 4 }}
data:
  NODE_ENV: {{ .Values.global.environment }}
  PORT: {{ .Values.apiGateway.port | quote }}
  GCP_PROJECT_ID: {{ .Values.global.gcpProjectId }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  FIRESTORE_DATABASE: {{ .Values.global.firestoreDatabase }}
  QUESTION_SERVICE_URL: "{{ .Release.Name }}-question-service.{{ .Values.namespaces.api }}.svc.cluster.local:{{ .Values.questionService.grpcPort }}"
  PAPER_GENERATOR_URL: "{{ .Release.Name }}-paper-generator.{{ .Values.namespaces.api }}.svc.cluster.local:{{ .Values.paperGenerator.grpcPort }}"
  CRYPTO_LIFECYCLE_URL: "{{ .Release.Name }}-crypto-lifecycle.{{ .Values.namespaces.api }}.svc.cluster.local:{{ .Values.cryptoLifecycle.grpcPort }}"
  EXAM_SESSION_SERVICE_URL: "{{ .Release.Name }}-exam-session-service.{{ .Values.namespaces.api }}.svc.cluster.local:{{ .Values.examSessionService.grpcPort }}"
  COLLUSION_ENGINE_URL: "{{ .Release.Name }}-collusion-engine.{{ .Values.namespaces.api }}.svc.cluster.local:{{ .Values.collusionEngine.grpcPort }}"
  BLOCKCHAIN_SERVICE_URL: "{{ .Release.Name }}-blockchain-service.{{ .Values.namespaces.api }}.svc.cluster.local:{{ .Values.blockchainService.grpcPort }}"
  LOG_LEVEL: "info"
