apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-gateway
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "api-gateway") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.apiGateway.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "pariksha.selectorLabels" (dict "Release" .Release "component" "api-gateway") | nindent 4 }}
