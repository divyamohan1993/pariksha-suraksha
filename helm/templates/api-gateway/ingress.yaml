{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "api-gateway") | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.global.domain }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
          - path: /auth/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
          - path: /admin/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-admin-dashboard
                port:
                  number: {{ .Values.adminDashboard.port }}
          - path: /exam/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-candidate-portal
                port:
                  number: {{ .Values.candidatePortal.port }}
          - path: /verify/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-candidate-portal
                port:
                  number: {{ .Values.candidatePortal.port }}
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-candidate-portal
                port:
                  number: {{ .Values.candidatePortal.port }}
{{- end }}
