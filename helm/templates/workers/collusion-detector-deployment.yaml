apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pariksha.serviceAccountName" (dict "Release" .Release "saName" .Values.workers.collusionDetector.serviceAccount.name) }}
  namespace: {{ .Values.namespaces.workers }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "collusion-detector") | nindent 4 }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.workers.collusionDetector.serviceAccount.gcpServiceAccount }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-collusion-detector
  namespace: {{ .Values.namespaces.workers }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "collusion-detector") | nindent 4 }}
spec:
  replicas: {{ .Values.workers.collusionDetector.replicas }}
  selector:
    matchLabels:
      {{- include "pariksha.selectorLabels" (dict "Release" .Release "component" "collusion-detector") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "collusion-detector") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pariksha.serviceAccountName" (dict "Release" .Release "saName" .Values.workers.collusionDetector.serviceAccount.name) }}
      securityContext:
        {{- include "pariksha.securityContext" . | nindent 8 }}
      {{- with .Values.workers.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workers.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: collusion-detector
          image: {{ .Values.global.image.registry }}/{{ .Values.workers.collusionDetector.image }}:{{ .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          env:
            - name: GCP_PROJECT_ID
              value: {{ .Values.global.gcpProjectId }}
            - name: PUBSUB_SUBSCRIPTION
              value: {{ .Values.workers.collusionDetector.pubsubSubscription }}
            - name: FIRESTORE_DATABASE
              value: {{ .Values.global.firestoreDatabase }}
            - name: BIGQUERY_DATASET
              value: "pariksha_analytics"
            - name: GCS_BUCKET_REPORTS
              value: {{ .Values.global.gcsBucketReports }}
            - name: ENVIRONMENT
              value: {{ .Values.global.environment }}
          resources:
            {{- toYaml .Values.workers.collusionDetector.resources | nindent 12 }}
          securityContext:
            {{- include "pariksha.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
---
{{- if .Values.workers.collusionDetector.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-collusion-detector
  namespace: {{ .Values.namespaces.workers }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "collusion-detector") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-collusion-detector
  minReplicas: {{ .Values.workers.collusionDetector.hpa.minReplicas }}
  maxReplicas: {{ .Values.workers.collusionDetector.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.workers.collusionDetector.hpa.targetCPUUtilization }}
    - type: External
      external:
        metric:
          name: pubsub.googleapis.com|subscription|num_undelivered_messages
          selector:
            matchLabels:
              resource.labels.subscription_id: {{ .Values.workers.collusionDetector.pubsubSubscription }}
        target:
          type: AverageValue
          averageValue: "5"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
{{- end }}
