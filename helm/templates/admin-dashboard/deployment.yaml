apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-admin-dashboard
  namespace: {{ .Values.namespaces.web }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "admin-dashboard") | nindent 4 }}
spec:
  replicas: {{ .Values.adminDashboard.replicas }}
  selector:
    matchLabels:
      {{- include "pariksha.selectorLabels" (dict "Release" .Release "component" "admin-dashboard") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "admin-dashboard") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pariksha.serviceAccountName" (dict "Release" .Release "saName" .Values.adminDashboard.serviceAccount.name) }}
      securityContext:
        {{- include "pariksha.securityContext" . | nindent 8 }}
      {{- include "pariksha.podAntiAffinity" "admin-dashboard" | nindent 6 }}
      {{- with .Values.adminDashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.adminDashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: admin-dashboard
          image: {{ .Values.global.image.registry }}/{{ .Values.adminDashboard.image }}:{{ .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.adminDashboard.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.global.environment }}
            - name: NEXT_PUBLIC_API_URL
              value: "https://{{ .Values.global.domain }}/api"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://{{ .Values.global.domain }}/ws"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.adminDashboard.resources | nindent 12 }}
          securityContext:
            {{- include "pariksha.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: nextjs-cache
          emptyDir:
            sizeLimit: 500Mi
