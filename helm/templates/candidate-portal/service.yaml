apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-candidate-portal
  namespace: {{ .Values.namespaces.web }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "candidate-portal") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.candidatePortal.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "pariksha.selectorLabels" (dict "Release" .Release "component" "candidate-portal") | nindent 4 }}
