apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-blockchain-service-config
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "blockchain-service") | nindent 4 }}
data:
  NODE_ENV: {{ .Values.global.environment }}
  PORT: {{ .Values.blockchainService.port | quote }}
  GRPC_PORT: {{ .Values.blockchainService.grpcPort | quote }}
  GCP_PROJECT_ID: {{ .Values.global.gcpProjectId }}
  FIRESTORE_DATABASE: {{ .Values.global.firestoreDatabase }}
  FABRIC_CHANNEL_NAME: {{ .Values.fabric.channelName }}
  FABRIC_CHAINCODE_NAME: {{ .Values.fabric.chaincodeName }}
  FABRIC_PEER_ENDPOINT: "{{ .Release.Name }}-peer0-pariksha.{{ .Values.namespaces.fabric }}.svc.cluster.local:7051"
  FABRIC_ORDERER_ENDPOINT: "{{ .Release.Name }}-orderer0.{{ .Values.namespaces.fabric }}.svc.cluster.local:7050"
  FABRIC_MSP_ID: "ParikshaSurakshaMSP"
  LOG_LEVEL: "info"
