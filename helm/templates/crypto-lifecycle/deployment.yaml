apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-crypto-lifecycle
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "crypto-lifecycle") | nindent 4 }}
spec:
  replicas: {{ .Values.cryptoLifecycle.replicas }}
  selector:
    matchLabels:
      {{- include "pariksha.selectorLabels" (dict "Release" .Release "component" "crypto-lifecycle") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "crypto-lifecycle") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/crypto-lifecycle/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "pariksha.serviceAccountName" (dict "Release" .Release "saName" .Values.cryptoLifecycle.serviceAccount.name) }}
      securityContext:
        {{- include "pariksha.securityContext" . | nindent 8 }}
      {{- include "pariksha.podAntiAffinity" "crypto-lifecycle" | nindent 6 }}
      {{- with .Values.cryptoLifecycle.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cryptoLifecycle.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: crypto-lifecycle
          image: {{ .Values.global.image.registry }}/{{ .Values.cryptoLifecycle.image }}:{{ .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.cryptoLifecycle.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.cryptoLifecycle.grpcPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-crypto-lifecycle-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis-secrets
                  key: redis-password
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.cryptoLifecycle.resources | nindent 12 }}
          securityContext:
            {{- include "pariksha.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
