apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pariksha.serviceAccountName" (dict "Release" .Release "saName" .Values.examSessionService.serviceAccount.name) }}
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "exam-session-service") | nindent 4 }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.examSessionService.serviceAccount.gcpServiceAccount }}
