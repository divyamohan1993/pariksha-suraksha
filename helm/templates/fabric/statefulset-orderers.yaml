{{- if .Values.fabric.enabled }}
{{- $root := . }}
{{- $orderers := list (dict "index" 0 "orgShort" "pariksha" "mspId" "ParikshaSurakshaMSP" "domain" "pariksha.dmj.one") (dict "index" 1 "orgShort" "nta" "mspId" "NTAMSP" "domain" "nta.pariksha.dmj.one") (dict "index" 2 "orgShort" "auditor" "mspId" "AuditorMSP" "domain" "auditor.pariksha.dmj.one") }}
{{- range $orderer := $orderers }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $root.Release.Name }}-orderer{{ $orderer.index }}
  namespace: {{ $root.Values.namespaces.fabric }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" $root.Chart "Release" $root.Release "component" (printf "orderer%d" (int $orderer.index))) | nindent 4 }}
spec:
  serviceName: {{ $root.Release.Name }}-orderer{{ $orderer.index }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "pariksha.selectorLabels" (dict "Release" $root.Release "component" (printf "orderer%d" (int $orderer.index))) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pariksha.componentLabels" (dict "Chart" $root.Chart "Release" $root.Release "component" (printf "orderer%d" (int $orderer.index))) | nindent 8 }}
        fabric-role: orderer
        fabric-org: {{ $orderer.orgShort }}
    spec:
      {{- with $root.Values.fabric.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.fabric.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: fabric-role
                    operator: In
                    values:
                      - orderer
              topologyKey: kubernetes.io/hostname
      containers:
        - name: orderer
          image: {{ $root.Values.fabric.ordererImage }}
          imagePullPolicy: {{ $root.Values.global.image.pullPolicy }}
          ports:
            - name: orderer
              containerPort: 7050
              protocol: TCP
            - name: operations
              containerPort: 8443
              protocol: TCP
          env:
            - name: FABRIC_LOGGING_SPEC
              value: "INFO"
            - name: ORDERER_GENERAL_LISTENADDRESS
              value: "0.0.0.0"
            - name: ORDERER_GENERAL_LISTENPORT
              value: "7050"
            - name: ORDERER_GENERAL_LOCALMSPID
              value: {{ $orderer.mspId }}
            - name: ORDERER_GENERAL_LOCALMSPDIR
              value: "/etc/hyperledger/fabric/msp"
            - name: ORDERER_GENERAL_TLS_ENABLED
              value: "true"
            - name: ORDERER_GENERAL_TLS_PRIVATEKEY
              value: "/etc/hyperledger/fabric/tls/server.key"
            - name: ORDERER_GENERAL_TLS_CERTIFICATE
              value: "/etc/hyperledger/fabric/tls/server.crt"
            - name: ORDERER_GENERAL_TLS_ROOTCAS
              value: "[/etc/hyperledger/fabric/tls/ca.crt]"
            - name: ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE
              value: "/etc/hyperledger/fabric/tls/server.crt"
            - name: ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY
              value: "/etc/hyperledger/fabric/tls/server.key"
            - name: ORDERER_GENERAL_CLUSTER_ROOTCAS
              value: "[/etc/hyperledger/fabric/tls/ca.crt]"
            - name: ORDERER_GENERAL_BOOTSTRAPMETHOD
              value: "none"
            - name: ORDERER_CHANNELPARTICIPATION_ENABLED
              value: "true"
            - name: ORDERER_ADMIN_TLS_ENABLED
              value: "true"
            - name: ORDERER_ADMIN_TLS_CERTIFICATE
              value: "/etc/hyperledger/fabric/tls/server.crt"
            - name: ORDERER_ADMIN_TLS_PRIVATEKEY
              value: "/etc/hyperledger/fabric/tls/server.key"
            - name: ORDERER_ADMIN_TLS_ROOTCAS
              value: "[/etc/hyperledger/fabric/tls/ca.crt]"
            - name: ORDERER_ADMIN_TLS_CLIENTROOTCAS
              value: "[/etc/hyperledger/fabric/tls/ca.crt]"
            - name: ORDERER_ADMIN_LISTENADDRESS
              value: "0.0.0.0:7053"
            - name: ORDERER_OPERATIONS_LISTENADDRESS
              value: "0.0.0.0:8443"
            - name: ORDERER_METRICS_PROVIDER
              value: "prometheus"
          livenessProbe:
            httpGet:
              path: /healthz
              port: operations
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: operations
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
          volumeMounts:
            - name: orderer-data
              mountPath: /var/hyperledger/production/orderer
            - name: fabric-crypto
              mountPath: /etc/hyperledger/fabric
              readOnly: true
      volumes:
        - name: fabric-crypto
          secret:
            secretName: {{ $root.Release.Name }}-fabric-crypto-orderer{{ $orderer.index }}
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: orderer-data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if $root.Values.fabric.persistence.storageClass }}
        storageClassName: {{ $root.Values.fabric.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ $root.Values.fabric.persistence.ordererSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $root.Release.Name }}-orderer{{ $orderer.index }}
  namespace: {{ $root.Values.namespaces.fabric }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" $root.Chart "Release" $root.Release "component" (printf "orderer%d" (int $orderer.index))) | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: orderer
      port: 7050
      targetPort: orderer
      protocol: TCP
    - name: operations
      port: 8443
      targetPort: operations
      protocol: TCP
  selector:
    {{- include "pariksha.selectorLabels" (dict "Release" $root.Release "component" (printf "orderer%d" (int $orderer.index))) | nindent 4 }}
---
{{- end }}
{{- end }}
