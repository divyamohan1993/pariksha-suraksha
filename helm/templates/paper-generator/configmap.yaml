apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-paper-generator-config
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "paper-generator") | nindent 4 }}
data:
  NODE_ENV: {{ .Values.global.environment }}
  PORT: {{ .Values.paperGenerator.port | quote }}
  GRPC_PORT: {{ .Values.paperGenerator.grpcPort | quote }}
  GCP_PROJECT_ID: {{ .Values.global.gcpProjectId }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  FIRESTORE_DATABASE: {{ .Values.global.firestoreDatabase }}
  PUBSUB_TOPIC_MATRIX_SOLVER: "matrix-solver-topic"
  LOG_LEVEL: "info"
