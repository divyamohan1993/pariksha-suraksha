apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-paper-generator
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "paper-generator") | nindent 4 }}
spec:
  replicas: {{ .Values.paperGenerator.replicas }}
  selector:
    matchLabels:
      {{- include "pariksha.selectorLabels" (dict "Release" .Release "component" "paper-generator") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "paper-generator") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/paper-generator/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "pariksha.serviceAccountName" (dict "Release" .Release "saName" .Values.paperGenerator.serviceAccount.name) }}
      securityContext:
        {{- include "pariksha.securityContext" . | nindent 8 }}
      {{- include "pariksha.podAntiAffinity" "paper-generator" | nindent 6 }}
      {{- with .Values.paperGenerator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.paperGenerator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: paper-generator
          image: {{ .Values.global.image.registry }}/{{ .Values.paperGenerator.image }}:{{ .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.paperGenerator.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.paperGenerator.grpcPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-paper-generator-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis-secrets
                  key: redis-password
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.paperGenerator.resources | nindent 12 }}
          securityContext:
            {{- include "pariksha.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
