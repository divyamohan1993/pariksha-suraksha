apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-question-service-config
  namespace: {{ .Values.namespaces.api }}
  labels:
    {{- include "pariksha.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "question-service") | nindent 4 }}
data:
  NODE_ENV: {{ .Values.global.environment }}
  PORT: {{ .Values.questionService.port | quote }}
  GRPC_PORT: {{ .Values.questionService.grpcPort | quote }}
  GCP_PROJECT_ID: {{ .Values.global.gcpProjectId }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  FIRESTORE_DATABASE: {{ .Values.global.firestoreDatabase }}
  GCS_BUCKET_FIELD_TEST: {{ .Values.global.gcsBucketFieldTest }}
  GEMINI_MODEL: "gemini-2.5-pro"
  LOG_LEVEL: "info"
